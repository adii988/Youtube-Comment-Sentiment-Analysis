stages:
  data_ingestion:
    cmd: python -m src.data.data_ingestion
    deps:
      - src/data/data_ingestion.py
    params:
      - data_ingestion.test_size
      - data_ingestion.random_state
    outs:
      - data/raw

  data_preprocessing:
    cmd: python -m src.data.data_preprocessing
    deps:
      - data/raw/train.csv
      - data/raw/test.csv
      - src/data/data_preprocessing.py
    outs:
      - data/interim

  feature_extraction:
    cmd: python -m src.features.feature_extraction
    deps:
      - data/interim/train_processed.csv
      - src/features/feature_extraction.py
    outs:
      - data/processed
      - models/tfidf_vectorizer.joblib

  model_building:
    cmd: python -m src.model.model_building
    deps:
      - data/processed
      - src/model/model_building.py
    params:
      - model_building.random_state
      - model_building.n_estimators
      - model_building.max_depth
      - model_building.learning_rate
      - model_building.num_leaves
      - model_building.min_child_samples
      - model_building.subsample
      - model_building.colsample_bytree
      - model_building.reg_alpha
      - model_building.reg_lambda
      - model_building.objective
      - model_building.num_class
      - model_building.class_weight
    outs:
      - models/lgbm_model.joblib

  model_evaluation:
    cmd: python -m src.model.model_evaluation
    deps:
      - models/lgbm_model.joblib
      - models/tfidf_vectorizer.joblib
      - data/interim/test_processed.csv
      - src/model/model_evaluation.py
    outs:
      - reports/figures/confusion_matrix_Test_Data.png
      - experiment_info.json

  model_registration:
    cmd: python -m src.model.register_model
    deps:
      - src/model/register_model.py
      - experiment_info.json